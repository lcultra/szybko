<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <title>Example Plugin</title>
    </head>
    <body>
        <h1>示例插件</h1>
        <p id="content">等待搜索...</p>
        <script>
            window.szybko?.onSearch?.((ctx) => {
                document.getElementById('content').textContent = `搜索: ${ctx.query}`;
                return [
                    {
                        id: 'example-' + ctx.query,
                        title: `示例结果: ${ctx.query}`,
                        subtitle: '来自示例插件',
                        icon: '🧩',
                        score: 50,
                        action: { type: 'clipboard.writeText', payload: { text: ctx.query } },
                    },
                ];
            });
        </script>
    </body>
</html>
